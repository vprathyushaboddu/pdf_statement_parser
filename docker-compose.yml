services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+psycopg2://statements:statements@db:5432/statements
      - DATA_DIR=/app/data
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=statements
      - POSTGRES_PASSWORD=statements
      - POSTGRES_DB=statements
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statements -d statements"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
